<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunny Creative Log</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <h1>☀️ Sunny Creative Log</h1>
    <p>創ることを、少しずつ積み重ねる。</p>

    <label>日付</label>
    <input type="date" id="date" />

    <label>種別</label>
    <select id="platform">
      <option value="note">note</option>
      <option value="しずかなインターネット">しずかなインターネット</option>
      <option value="その他">その他</option>
    </select>

    <label>作品を選択</label>
    <select id="workSelect"></select>
    
    <label>新しい作品名</label>
    <input type="text" id="newTitle" placeholder="新しい作品の場合だけ入力" />

    <label>作業</label>
    <select id="workType">
      <option value="新規">新規</option>
      <option value="続き">続き</option>
      <option value="推敲">推敲</option>
      <option value="構成">構成</option>
      <option value="公開">公開</option>
    </select>

    <label>文字数</label>
    <input type="number" id="chars" placeholder="空欄でもOK" />

    <label>メモ</label>
    <textarea id="memo" placeholder="例：コメダで書き上げた"></textarea>

    <button onclick="addLog()">記録する</button>
    
    <div class="work-actions">
      <h2>作品管理</h2>

      <label>選択中の作品名を編集</label>
      <input type="text" id="editWorkTitle" placeholder="作品名を変更する場合に入力" />

      <button onclick="updateWorkTitle()">作品名を更新する</button>
      <button class="delete-btn" onclick="deleteSelectedWorkIfEmpty()">ログのない作品を削除する</button>
    </div>

    <div class="summary" id="summary"></div>

    <h2>ログ一覧</h2>
    <div id="logs"></div>
  </div>
  <script src="js/scl.js" charset="utf-8"></script>
</body>
</html>
